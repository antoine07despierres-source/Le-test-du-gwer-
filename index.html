<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quel type de Gwer es‑tu réellement ?</title>
<style>
@import url('[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;500;700&display=swap)');
body{
  margin:0;
  background:linear-gradient(135deg,#f7f8ff 0%,#e7ebff 100%);
  font-family:'Poppins',sans-serif;
  color:#222;overflow-x:hidden;
}
.container{
  max-width:800px;margin:0 auto;padding:60px 30px;text-align:center;
}
h1{font-family:'Fredoka One',cursive;font-size:3.3rem;color:#293089;
  margin-bottom:.2em;text-shadow:2px 2px 0 #fff;}
h2{color:#444;font-weight:400;font-size:1.2rem;margin-top:0;}
button{background:#405ed4;color:#fff;border:none;border-radius:40px;
  padding:16px 40px;font-size:1.1rem;cursor:pointer;transition:.3s;
  box-shadow:0 4px 10px rgba(0,0,0,.2);}
button:hover{transform:translateY(-3px);background:#314ac4;}
.icons{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin:25px 0 40px 0;}
.icons span{font-size:2.8rem;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.qcontainer{text-align:center;padding:10vh 5vw;animation:fade .6s ease;}
@keyframes fade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
h3{font-family:'Fredoka One';color:#1e2b88;font-size:2rem;margin-bottom:.3em;}
input[type=text],input[type=number],select,input[type=range]{
  width:80%;max-width:500px;border:3px solid #405ed4;border-radius:30px;
  padding:15px;font-size:1.1rem;outline:none;margin-top:15px;transition:.3s;}
input:focus,select:focus{box-shadow:0 0 10px rgba(64,94,212,0.5);}
.range-label{display:flex;justify-content:space-between;width:80%;margin:6px auto;font-size:.9em;color:#555;}
.progress-container{height:10px;width:80%;margin:25px auto;background:#ddd;border-radius:50px;overflow:hidden;}
.bar{height:100%;background:linear-gradient(90deg,#405ed4,#f06eaa,#f4c542);width:0%;transition:width .6s ease;}
.note{font-size:.9em;color:#555;background:#eef3ff;border-radius:25px;padding:10px;width:70%;margin:20px auto;}
footer{text-align:center;font-size:.8em;color:#777;margin:25px 0;}
</style>
</head>
<body>
<div class="container" id="main">
  <h1>Quel type de Gwer es‑tu ?</h1>
  <h2>Découvre à quoi ressemble réellement ton existence.</h2>
  <div class="icons"><span>🍺</span><span>💸</span><span>🤓</span><span>🎓</span><span>🏠</span><span>🌍</span></div>
  <button onclick="start()">Commencer le test</button>
</div>
<footer>Site humoristique et non lucratif © 2024</footer>
<script>
/* -------- QUESTIONS -------- */
const questions=[
 {id:"nom",text:"Quel est ton nom, prénom ou surnom ?",type:"text",
  note:"🛈 Ces informations ne seront jamais diffusées.<br>⚠️ Le seul risque serait de finir en story 204."},
 {id:"age",text:"Quel âge as‑tu ?",type:"number"},
 {id:"commune",text:"Où vis‑tu ?",type:"text"},
 {id:"etudes",text:"Fais‑tu des études ?",type:"select",options:["Oui","Non"]},
 {id:"typeetudes",text:"Si oui, quel type d’études ?",type:"text"},
 {id:"croyant",text:"Es‑tu croyant ?",type:"select",options:["Oui","Non"]},
 {id:"revenusparents",text:"Revenus mensuels nets de tes parents ?",type:"select",
  options:["0‑1000","1000‑3000","3000‑5000","5000‑7000","7000‑10000","plus de 10000"]},
 {id:"depenseperso",text:"Combien payes‑tu chaque mois (logement, études, nourriture, déplacements) sans aide parentale ?",type:"number"},
 {id:"revenuperso",text:"Quels sont tes revenus nets mensuels (€) ?",type:"number"},
 {id:"politique",text:"Sur le spectre politique belge, où te situes‑tu ?",type:"range"},
 {id:"sante",text:"En cas d’accident ou maladie, as‑tu accès à des soins ?",type:"select",options:["Oui","Non","Je ne sais pas"]},
 {id:"voyages",text:"Combien de pays as‑tu déjà visités ?",type:"number"},
 {id:"revenufutur",text:"Quels sont tes objectifs de revenus futurs (€) ?",type:"number"},
 {id:"drôle",text:"Te considères‑tu comme quelqu’un de drôle ?",type:"select",options:["Oui","Non","Seulement après 3 bières"]},
 {id:"loisirs",text:"Combien dépenses‑tu par mois pour tes loisirs (oui, l’alcool et la drogue comptent) ?",type:"number"},
 {id:"probleme",text:"Quel est ton plus gros problème dans la vie ? (non, le méga‑knight évolué ne compte pas)",type:"text"},
 {id:"heureux",text:"Penses‑tu être heureux ?",type:"select",options:["Oui","Non","Je ne sais pas"]}
];
let i=0,data={},barProg=0;
function start(){i=0;nextQuestion();}
function nextQuestion(){
  const q=questions[i];
  if(!q){analyse();return;}
  let html=`<div class='qcontainer'><div class='progress-container'><div class='bar' style='width:${barProg}%'></div></div>`;
  html+=`<h3>${q.text}</h3>`;
  if(q.type==="text"||q.type==="number") html+=`<input type='${q.type}' id='answer'>`;
  else if(q.type==="select"){
     html+=`<select id='answer'><option value=''>Sélectionne</option>`;
     q.options.forEach(o=>html+=`<option>${o}</option>`);html+="</select>";
  }else if(q.type==="range"){
     html+=`<input type='range' min='0' max='100' id='answer'><div class='range-label'><span>⬅︎ Gauche</span><span>Centre</span><span>Droite ➡︎</span></div>`;
  }
  if(q.note)html+=`<div class='note'>${q.note}</div>`;
  html+=`<button onclick='saveAnswer()'>Suivant ➜</button></div>`;
  document.body.innerHTML=html;
  animateBar();
}
function animateBar(){barProg=Math.min(100,barProg+100/questions.length);
  const b=document.querySelector(".bar");if(b)b.style.width=barProg+"%";}
function saveAnswer(){
  const val=document.getElementById("answer").value;
  if(!val){alert("Réponds avant de continuer 😉");return;}
  data[questions[i].id]=val;i++;nextQuestion();
}
/* -------- ANALYSE -------- */
function analyse(){
 const fd=new FormData();
 for(const [k,v] of Object.entries(data))fd.append(k,v);
 fetch("[formspree.io](https://formspree.io/f/mvzwbelb)",{method:"POST",body:fd,headers:{"Accept":"application/json"}});
 const revenu=parseFloat(data["revenuperso"]||0);
 const parents=data["revenusparents"]||"";
 const politique=parseInt(data["politique"]||50);
 const heureux=(data["heureux"]||"").toLowerCase().includes("oui");
 let score=0;
 if(revenu>3000)score+=30; else if(revenu>1200)score+=20; else score+=10;
 if(parents.includes("10000")||parents.includes("7000"))score+=30;
 if(politique>70)score+=10; else if(politique<30)score+=10; else score+=20;
 if(heureux)score+=10;
 const total=Math.min(100,score);
 
 let profilTxt="",titre="";
 if(total>=80){titre="Le Gwer hédoniste surendetté";
 profilTxt=`Tu incarnes la quintessence de l’étudiant moderne : toujours à moitié fauché mais jamais sans un plan pour “oublier tes études” le jeudi soir.
Ton compte en banque vit dans un état de stress post‑traumatique permanent, mais ta confiance en toi reste étonnamment stable.
Tu considères le café comme un substitut d’oxygène et les deadlines comme des concepts philosophiques.
Ta vision politique évolue au rythme de la pression du semestre.
Tu as un tableau Excel pour tes dettes, mais pas pour ton avenir.
Tes parents t’adorent, ton banquier beaucoup moins.
Tu rêves d’un monde plus juste, mais aussi d’un mojito à 2 € la canette.
La solidarité ? Bien sûr, à condition qu’elle te laisse la place au kot.
Tu es capable d’écrire un mémoire de 60 pages la veille à minuit et de dormir quatre heures avec fierté.
Ton ambition oscille entre “changer la société” et “trouver un stage payé”.
Bref, tu es le Gwer hédoniste : brillant le soir, somnolent le matin, et philosophe à découvert.`;}
 else if(total>=60){titre="Le Gwer équilibré en crise de sens";
 profilTxt=`Tu jongles entre militantisme du week‑end et binge‑watching sociétal.
Tu es ce mélange délicat d’idéalisme et de pragmatisme en PLS.
Tes finances sont correctes, ton sommeil inexistant.
Ton PC portable a plus vu de cafés qu’un serveur chez Starbucks.
Tu as déjà lu deux articles sur Marx, un sur la productivité et un tuto TikTok sur la méditation.
Tes convictions politiques dépendent de la météo et de ton taux de caféine.
Tes amis te trouvent stable, toi tu te demandes si exister sans Wi‑Fi est moral.
Tu fais mine d’être déconnecté du capitalisme, mais tu pleures à la fin du panier Uber Eats.
Le Gwer équilibré sait que tout va mal mais “bon, faut bien avancer”.`;
 }
 else if(total>=40){titre="Le Gwer cynique qui croit encore au blocage de routes";
 profilTxt=`Tu observes la société comme un documentaire triste mais fascinant.
Ton sarcasme alimente ta survie morale.
Tu te dis détaché, mais tu signes toutes les pétitions et collectionnes les tote‑bags militants.
Tes soirées préférées ? celles où vous refaites le monde entre deux bières tièdes.
Tes revenus flirtent avec le Smic, ton esprit avec la révolte.
Tu vis dans un mélange étrange de désillusion et d’espoir collectif.
Les Gwer comme toi sont les poètes de la débrouille et les économistes du ticket‑repas.
Tu rêves de fuir le système, mais ton téléphone est fabriqué par lui.
Ta plus grande victoire : continuer à avoir de l’ironie.`;
 }
 else if(total>=20){titre="Le Gwer rêveur socialement précaire";
 profilTxt=`Tu es l’âme bohème de la société en solde.
Ton budget hebdomadaire : un pain, du café, et l’énergie du désespoir.
Tes études ? passionnantes mais “très symboliques sur un CV”.
Tes croyances oscillent entre horoscope et burn‑out annoncé.
Tu souris parce que tu refuses de calculer ton découvert.
Le Gwer rêveur fait des blagues sur sa précarité, mais sauve le monde avec des PowerPoint.
Tu crois encore au grand amour, au crédit sans caution et à la suppression des minerval.
Ton humour est d’une valeur inestimable, contrairement à ton compte épargne.`;
 }
 else {titre="Le Gwer philosophe du pain sec";
 profilTxt=`Tu regardes l’existence avec la lucidité d’un moine et le portefeuille d’un étudiant.
Tu n’as plus peur de rien : ni de l’avenir, ni du micro‑onde du kot.
Tu as atteint un niveau de détachement que même le Bouddha appellerait “abusé”.
Tes repas sont un festival de pâtes et d’introspection.
Tu te dis que tout ceci est peut‑être une simulation – probablement celle d’un stagiaire mal payé.
Tu ris de ta condition, parce que sinon il faudrait pleurer.
Le Gwer philosophe transforme la misère en art performatif et les fins de mois en expérience spirituelle.
Tu es pauvre, certes, mais d’une richesse intérieure qui ne paie aucune facture.`;}
 // Position mondiale
 let top=75;
 if(revenu>7000)top=1; else if(revenu>3000)top=10;
 else if(revenu>1200)top=20; else if(revenu>700)top=40; else if(revenu>300)top=60;
 document.body.innerHTML=`<div class='qcontainer'>
 <div class='progress-container'><div class='bar' style='width:100%'></div></div>
 <h2>${titre}</h2>
 <p style='white-space:pre-line;text-align:justify;line-height:1.5;'>${profilTxt}</p>
 <p style='margin-top:30px;font-weight:600;text-align:center;'>Sur une échelle socio‑économique mondiale,<br>
 tu fais partie du <strong>top ${top}%</strong> de la population mondiale.</p>
 <button onclick='location.reload()'>Recommencer 🎯</button></div>`;
}</script>
</body>
</html>
